# ============================================================================
# tmux configuration
# ============================================================================

# ----------------------------------------------------------------------------
# Prefix
# ----------------------------------------------------------------------------
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ----------------------------------------------------------------------------
# General
# ----------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g history-limit 50000
set -sg escape-time 10
set -g focus-events on
set -g mouse on

# Index windows/panes from 1 and renumber on close
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Allow titles to be set by terminal
set -g set-titles on
set -g set-titles-string "#S / #W"

# ----------------------------------------------------------------------------
# Splits and windows (open in current path)
# ----------------------------------------------------------------------------
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ----------------------------------------------------------------------------
# Vim-style pane navigation
# ----------------------------------------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize with repeat (hold prefix briefly, then tap H/J/K/L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick window cycling
bind -r n next-window
bind -r p previous-window
bind Tab last-window

# ----------------------------------------------------------------------------
# Copy mode (vi-style)
# ----------------------------------------------------------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle

# Clipboard integration (Linux X11)
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -in -selection clipboard"
# Wayland alternative:
# bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"
# macOS alternative:
# bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# ----------------------------------------------------------------------------
# Reload config
# ----------------------------------------------------------------------------
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ----------------------------------------------------------------------------
# Status bar (minimal)
# ----------------------------------------------------------------------------
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=default,fg=white"

set -g status-left-length 30
set -g status-left "#[fg=green,bold][#S] "
set -g status-right "#[fg=cyan]%Y-%m-%d #[fg=yellow]%H:%M "

setw -g window-status-current-style "fg=black,bg=cyan,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "

# Pane borders
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=cyan"

# ----------------------------------------------------------------------------
# Plugins (TPM)
# Install: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then press: prefix + I  (capital i) to install plugins
# ----------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

# resurrect/continuum settings
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
